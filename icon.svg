<svg width="500" height="180" viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg">

  <!-- Background Glow -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circle Glow -->
  <circle cx="90" cy="90" r="55" fill="url(#grad1)" opacity="0.15"/>

  <!-- Pen Icon -->
  <g transform="translate(60,50)" filter="url(#glow)">
    <rect x="0" y="0" width="60" height="12" rx="6" fill="url(#grad1)" transform="rotate(45 30 6)"/>
    <polygon points="58,2 72,6 58,10" fill="#ffffff"/>
  </g>

  <!-- Brand Name -->
  <text x="150" y="100"
        font-family="Segoe UI, sans-serif"
        font-size="42"
        font-weight="700"
        fill="url(#grad1)"
        letter-spacing="1">
        SpyuWrite
  </text>

  <!-- Tagline -->
  <text x="152" y="130"
        font-family="Segoe UI, sans-serif"
        font-size="14"
        fill="#9ca3af"
        letter-spacing="2">
        EXPRESS · INSPIRE · CONNECT
  </text>

</svg>