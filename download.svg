<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"></stop>
      <stop offset="100%" stop-color="#60a5fa"></stop>
    </linearGradient>
  </defs>

  <!-- Rounded square -->
  <rect x="4" y="4" width="56" height="56" rx="16" fill="#0f0f0f"></rect>

  <!-- Glow circle -->
  <circle cx="32" cy="32" r="18" fill="url(#bg)" opacity="0.25"></circle>

  <!-- Pen icon -->
  <g transform="translate(18,20) rotate(45)">
    <rect x="0" y="0" width="26" height="6" rx="3" fill="url(#bg)"></rect>
    <polygon points="26,0 34,3 26,6" fill="#ffffff"></polygon>
  </g>

</svg>